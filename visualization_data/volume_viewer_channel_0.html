
<!DOCTYPE html>
<html>
<head>
    <title>3D Volume Viewer - Channel 0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #info { position: absolute; top: 10px; left: 10px; color: white; font-family: Arial; }
        #controls { position: absolute; top: 10px; right: 10px; color: white; font-family: Arial; background: rgba(0,0,0,0.7); padding: 10px; }
    </style>
</head>
<body>
    <div id="info">
        <h3>3D Volume Viewer - Channel 0</h3>
        <p>Shape: [49, 172, 341]</p>
        <p>Mouse: Rotate | Wheel: Zoom | Right-click: Pan</p>
    </div>
    <div id="controls">
        <label>Threshold: <input type="range" id="threshold" min="0" max="255" value="128"></label><br>
        <label>Opacity: <input type="range" id="opacity" min="0" max="100" value="50"></label><br>
        <button onclick="resetCamera()">Reset Camera</button>
    </div>

    <script>
        let scene, camera, renderer, volume;
        const dataFile = 'channel_0_data.raw';
        const metadata = [49, 172, 341];
        const size = 13.918367346938776;

        // Scene setup
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000);
        document.body.appendChild(renderer.domElement);

        // Load volume data
        fetch(dataFile)
            .then(response => response.arrayBuffer())
            .then(buffer => {
                const data = new Uint8Array(buffer);
                createVolume(data);
            });

        function createVolume(data) {
            // Create 3D texture for volume rendering
            const texture = new THREE.DataTexture3D(
                data, metadata.shape[2], metadata.shape[1], metadata.shape[0]
            );
            texture.format = THREE.RedFormat;
            texture.type = THREE.UnsignedByteType;
            texture.minFilter = THREE.LinearFilter;
            texture.magFilter = THREE.LinearFilter;

            // Create volume material (simplified approach)
            // For full volume rendering, you'd use a custom shader
            const geometry = new THREE.BoxGeometry(size, size, size);
            const material = new THREE.MeshBasicMaterial({ 
                color: 0x00ff00,
                wireframe: true,
                opacity: 0.3,
                transparent: true
            });

            volume = new THREE.Mesh(geometry, material);
            scene.add(volume);

            // Add point cloud for visualization
            const points = [];
            const colors = [];
            const threshold = 128;

            for (let i = 0; i < data.length; i += 10) {  // Sample every 10th point
                if (data[i] > threshold) {
                    const z = Math.floor(i / (metadata.shape[1] * metadata.shape[2]));
                    const y = Math.floor((i % (metadata.shape[1] * metadata.shape[2])) / metadata.shape[2]);
                    const x = i % metadata.shape[2];

                    points.push(
                        (x / metadata.shape[2] - 0.5) * size,
                        (y / metadata.shape[1] - 0.5) * size,
                        (z / metadata.shape[0] - 0.5) * size
                    );
                    colors.push(data[i] / 255, data[i] / 255, data[i] / 255);
                }
            }

            const pointGeometry = new THREE.BufferGeometry();
            pointGeometry.setAttribute('position', new THREE.Float32BufferAttribute(points, 3));
            pointGeometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

            const pointMaterial = new THREE.PointsMaterial({
                size: 0.01,
                vertexColors: true,
                transparent: true,
                opacity: 0.6
            });

            const pointCloud = new THREE.Points(pointGeometry, pointMaterial);
            scene.add(pointCloud);
        }

        // Camera controls
        camera.position.set(2, 2, 2);
        camera.lookAt(0, 0, 0);

        let mouseDown = false;
        let mouseX = 0, mouseY = 0;

        renderer.domElement.addEventListener('mousedown', (e) => {
            mouseDown = true;
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        renderer.domElement.addEventListener('mouseup', () => {
            mouseDown = false;
        });

        renderer.domElement.addEventListener('mousemove', (e) => {
            if (mouseDown) {
                const dx = e.clientX - mouseX;
                const dy = e.clientY - mouseY;
                camera.rotateX(dy * 0.01);
                camera.rotateY(dx * 0.01);
                mouseX = e.clientX;
                mouseY = e.clientY;
            }
        });

        renderer.domElement.addEventListener('wheel', (e) => {
            camera.position.multiplyScalar(1 + e.deltaY * 0.001);
        });

        function resetCamera() {
            camera.position.set(2, 2, 2);
            camera.lookAt(0, 0, 0);
        }

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
